<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="shield-glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FF7A1A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF7A1A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shield-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E2530"/>
      <stop offset="100%" stop-color="#0D1520"/>
    </linearGradient>
    <linearGradient id="hex-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7A1A" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#FF7A1A" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FF7A1A" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Ambient glow behind shield -->
  <circle cx="32" cy="30" r="30" fill="url(#shield-glow)"/>

  <!-- Outer shield shell -->
  <path d="M32 4L10 14v12c0 12 7.6 23 22 26 14.4-3 22-14 22-26V14L32 4z" fill="url(#shield-body)" stroke="#FF7A1A" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Inner shield border highlight -->
  <path d="M32 8L13 16.5v9.5c0 10.3 6.5 19.8 19 22.3 12.5-2.5 19-12 19-22.3v-9.5L32 8z" fill="none" stroke="#FF7A1A" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Hexagonal OT/ICS grid pattern -->
  <polygon points="32,16 40,21 40,31 32,36 24,31 24,21" fill="none" stroke="#FF7A1A" stroke-width="0.8" stroke-opacity="0.15"/>
  <polygon points="32,20 37,23 37,29 32,32 27,29 27,23" fill="none" stroke="#FF7A1A" stroke-width="0.6" stroke-opacity="0.1"/>

  <!-- Circuit trace — left -->
  <path d="M16 26l3 0 0-4 3 0" stroke="#FF7A1A" stroke-width="1" stroke-opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="22" cy="22" r="1.5" fill="#FF7A1A" fill-opacity="0.4"/>

  <!-- Circuit trace — right -->
  <path d="M48 28l-4 0 0-6-3 0" stroke="#FF7A1A" stroke-width="1" stroke-opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="41" cy="22" r="1.5" fill="#FF7A1A" fill-opacity="0.4"/>

  <!-- Circuit node — top -->
  <circle cx="32" cy="16" r="1" fill="#FF7A1A" fill-opacity="0.3"/>

  <!-- Shield checkmark with glow -->
  <path d="M22 32l6 6 14-14" stroke="#FF7A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.9"/>
  <path d="M22 32l6 6 14-14" stroke="#FF7A1A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.15"/>

  <!-- Bottom circuit dots -->
  <circle cx="26" cy="40" r="1" fill="#FF7A1A" fill-opacity="0.3"/>
  <circle cx="32" cy="42" r="1" fill="#FF7A1A" fill-opacity="0.2"/>
  <circle cx="38" cy="40" r="1" fill="#FF7A1A" fill-opacity="0.3"/>
</svg>
